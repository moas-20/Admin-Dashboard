<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Dashboard</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>  

        

        <div class="container">
            <div class="sidebar">
                <div class="nav">
                    <img src="imgs/svg/view-dashboard.svg" alt="logo" class="logo">
                    <h2>Dashboard</h2>
                </div>

                <div class="side-items">
                    <div class="item">
                        <img src="imgs/svg/home.svg" alt="Home">
                        <p>Home</p>
                    </div>

                    <div class="item">
                        <img src="imgs/svg/card-account-details-outline.svg" alt="Profile">
                        <p>Profile</p>
                    </div>

                    <div class="item">
                        <img src="imgs/svg/message-reply-outline.svg" alt="Message">
                        <p>Message</p>
                    </div>

                    <div class="item">
                        <img src="imgs/svg/clock-outline.svg" alt="History">
                        <p>History</p>
                    </div>

                    <div class="item">
                        <img src="imgs/svg/card-account-details-outline.svg" alt="Task">
                        <p>Task</p>
                    </div>

                    <div class="item">
                        <img src="imgs/svg/account-group-outline.svg" alt="communite">
                        <p>Communite</p>
                    </div>
                </div>


                <div class="contact">
                    <div class="item-2">
                        <img src="imgs/svg/cog.svg" alt="setting">
                        <p>Setting</p>
                    </div>
                    <div class="item-2">
                        <img src="imgs/svg/account-supervisor-circle.svg" alt="support">
                        <p>Support</p>
                    </div>
                    <div class="item-2">
                        <img src="imgs/svg/help-box.svg" alt="privacy">
                        <p>Privacy</p>
                    </div>
                </div>

            </div>

            <div class="main"></div>

        </div>
    
        
        


    </body>
</html>
