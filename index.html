<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Dashboard</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>  

        

        <div class="container">
            <div class="sidebar">
                <div class="nav">
                    <img src="imgs/svg/view-dashboard.svg" alt="logo" class="logo">
                    <h2>Dashboard</h2>
                </div>

                <div class="side-items">
                    <div class="item">
                        <img src="imgs/svg/home.svg" alt="Home">
                        <p>Home</p>
                    </div>

                    <div class="item">
                        <img src="imgs/svg/card-account-details-outline.svg" alt="Profile">
                        <p>Profile</p>
                    </div>

                    <div class="item">
                        <img src="imgs/svg/message-reply-outline.svg" alt="Message">
                        <p>Message</p>
                    </div>

                    <div class="item">
                        <img src="imgs/svg/clock-outline.svg" alt="History">
                        <p>History</p>
                    </div>

                    <div class="item">
                        <img src="imgs/svg/card-account-details-outline.svg" alt="Task">
                        <p>Task</p>
                    </div>

                    <div class="item">
                        <img src="imgs/svg/account-group-outline.svg" alt="communite">
                        <p>Communite</p>
                    </div>
                </div>

                <div class="contact">
                    <div class="item-2">
                        <img src="imgs/svg/cog.svg" alt="setting">
                        <p>Setting</p>
                    </div>
                    <div class="item-2">
                        <img src="imgs/svg/account-supervisor-circle.svg" alt="support">
                        <p>Support</p>
                    </div>
                    <div class="item-2">
                        <img src="imgs/svg/help-box.svg" alt="privacy">
                        <p>Privacy</p>
                    </div>
                </div>

            </div>

            <div class="main">
                <div class="main-nav">
                    <div class="search">
                        <div class="search-items">
                            <img src="imgs/svg/search.svg" alt="search">
                            <input type="search">
                        </div>

                        <div class="notfict">
                            <img src="imgs/svg/bell-ring-outline.svg" alt="bell" class="bell">
                            <img src="imgs/pro/php3.jpg" alt="" class="pfp">
                            <p>Steve Jops</p>
                        </div>
                    </div>

                    <div class="profile">
                        <div class="profile-img">
                            <img src="imgs/pro/php3.jpg" alt="pfp" class="pfp2">
                            <div class="greet">
                                <span>Hi There,</span>
                                <p>Steve Jops @steve</p>
                            </div>
                            
                        </div>
                        <div class="profile-links">
                            <ul>
                                <li><button>New</button></li>
                                <li><button>Update</button></li>
                                <li><button>Share</button></li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="projects"></div>

            </div>

        </div>
    
        
        


    </body>
</html>
